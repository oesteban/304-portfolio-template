name: Build Portfolio PDF
on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          locked: false
      - name: Build good example
        run: |
          cp portfolio.example-good.yaml portfolio.yaml
          cp questions.example-good.yaml questions.yaml
          pixi run build
          mv portfolio.pdf portfolio-example-good.pdf
      - name: Build bad example
        run: |
          cp portfolio.example-bad.yaml portfolio.yaml
          cp questions.example-bad.yaml questions.yaml
          pixi run build
          mv portfolio.pdf portfolio-example-bad.pdf
      - uses: actions/upload-artifact@v4
        with:
          name: portfolio-examples
          path: portfolio-example-*.pdf
      - if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: portfolio-example-*.pdf
