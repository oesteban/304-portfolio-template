[workspace]
name = "304-portfolio"
version = "0.1.0"
description = "Competency portfolio — Module 304 (Medical Informatics)"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
typst = ">=0.14"
python = ">=3.11"
pyyaml = ">=6"

[tasks]
check-links = "python check-links.py || true"
ci-convert-paths = "python ci-convert-paths.py"
render-mermaid = "python render-mermaid.py"
build = { cmd = "typst compile portfolio.typ portfolio.pdf", depends-on = ["check-links", "render-mermaid"] }
build-ci = { cmd = "typst compile portfolio.typ portfolio.pdf", depends-on = ["check-links", "render-mermaid", "ci-convert-paths"] }
clean = "rm -f portfolio.pdf broken_links.yaml _portfolio.yaml"
