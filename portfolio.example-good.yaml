# Example: well-structured portfolio (fictional project "AquaSense")
# Copy this file to portfolio.yaml to see how a strong portfolio renders.
#
# Key patterns demonstrated:
#   - Every entry has substantive what/why/reflection
#   - Evidence is always present and varied (PRs, notebooks, docs, figures)
#   - Reflections contain transferable lessons, not just competency paraphrase
#   - Entries are self-contained, substantial contributions
#   - Figures referenced for visual work (architecture, data viz)
#   - All skill weights sum to 1.0
#   - All evidence URLs resolve (link checker passes clean)
#
# NOTE: Evidence URLs point to real public repos for demonstration purposes.
# In your portfolio, replace them with links to your own project artifacts.
#
# NOTE: The "figures:" blocks are commented out because the referenced
# images don't exist in this template. In a real portfolio, uncomment
# them and place your images in figures/.

entries:
  - title: "BLE sensor protocol analysis and driver implementation"
    date:
      start: "2026-02-18"
      end: "2026-02-24"
    sprint: [W1, W2]
    skills:
      cs_engineer: 0.7
      data_engineer: 0.3
      professionalism: 0.0
    what: >
      Reverse-engineered the AquaSense probe's BLE GATT service table
      to identify the correct characteristic UUIDs for pH, dissolved oxygen,
      and turbidity readings. Implemented a Python driver using bleak that
      subscribes to notifications and parses the 12-byte payload into
      calibrated SI units. Wrote unit tests covering all 6 known payload
      variants documented in the vendor's PDF.
    why: >
      The vendor SDK only supports Windows/.NET; our pipeline runs on
      Linux. Understanding the binary protocol at the byte level was
      necessary to build a cross-platform acquisition layer. This is a
      core CS-engineering task: decomposing a complex interface into a
      clean abstraction that the rest of the team can use without
      understanding BLE internals.
    reflection: >
      I initially trusted the vendor's documentation, but discovered two
      undocumented payload variants during edge-case testing. Lesson:
      always test with real hardware before freezing the protocol spec.
      In hindsight, I should have started with a packet capture session
      rather than reading the PDF first.
    evidence:
      - label: "BLE driver PR"
        url: "https://github.com/hbldh/bleak/pull/1"
      - label: "Protocol analysis notes"
        url: "https://github.com/hbldh/bleak/blob/develop/README.rst"

  - title: "Scrum setup and team working agreement"
    date: "2026-02-25"
    sprint: "W1"
    skills:
      cs_engineer: 0.0
      data_engineer: 0.0
      professionalism: 1.0
    what: >
      Facilitated the initial team meeting where we defined our working
      agreement: daily async standups on Slack, weekly 30-min sync,
      rotating SM/PO roles. Created the GitHub Projects board with
      columns matching our sprint workflow (Backlog → In Progress →
      Review → Done). Documented the agreement in the repo wiki.
    why: >
      A clear working agreement reduces friction when disagreements arise
      later. As the first Scrum Master, I needed to set a collaborative
      tone while ensuring the process was lightweight enough that the team
      would actually follow it. Arguing for async standups over daily
      video calls required justifying the tradeoff (flexibility vs.
      real-time communication).
    reflection: >
      The async standup format worked well for the first two weeks, but
      I noticed that two teammates rarely posted updates. Next time, I
      would add a simple "no update = blocker check-in" rule to catch
      silent blockers earlier. Balancing my instinct to work alone with
      the need to actively facilitate was harder than I expected.
    evidence:
      - label: "Working agreement"
        url: "https://github.com/oesteban/304-portfolio-template/blob/main/README.md"
      - label: "Board screenshot"
        path: "figures/board-w1.png"

  - title: "Data pipeline architecture design"
    date: "2026-03-03"
    sprint: "W2"
    skills:
      cs_engineer: 0.3
      data_engineer: 0.7
      professionalism: 0.0
    what: >
      Designed the end-to-end data pipeline: BLE acquisition → local
      SQLite buffer → nightly sync to PostgreSQL → dbt transformations →
      dashboard. Drew the architecture diagram (see figure) and wrote an
      ADR justifying the choice of SQLite as the edge buffer over a
      direct MQTT stream, based on our reliability requirements
      (probe may lose connectivity for hours in field deployments).
    why: >
      Orchestrating a data pipeline from edge sensor to analytics
      dashboard is the core Data-engineering competency. The design
      needed to account for intermittent connectivity, out-of-order
      timestamps, and a 500 Hz sampling rate that generates ~40 MB/day.
      Modelling the pipeline as a DAG before coding prevented us from
      coupling acquisition to transformation.
    reflection: >
      During the design review, a teammate pointed out that SQLite
      write-locking could become a bottleneck if we later add a second
      sensor. I added a note to the ADR about switching to DuckDB if
      concurrent writes become necessary. This taught me the value of
      documenting "decision boundaries" — the conditions under which
      a design choice should be revisited.
    evidence:
      - label: "Architecture ADR"
        url: "https://github.com/duckdb/duckdb/blob/main/README.md"
      - label: "Pipeline diagram"
        path: "figures/pipeline-architecture.png"
      - label: "Design review notes"
        url: "https://github.com/dbt-labs/dbt-core/blob/main/README.md"
    # figures:
    #   - path: "figures/pipeline-architecture.png"
    #     caption: "End-to-end data pipeline architecture (W2 design review version)"

  - title: "Expert meeting preparation and synthesis — Prof. Dupont (hydrology)"
    date: "2026-03-04"
    sprint: "W2"
    skills:
      cs_engineer: 0.0
      data_engineer: 0.5
      professionalism: 0.5
    what: >
      Prepared 5 domain-specific questions for the meeting with
      Prof. Dupont (hydrology department) about water quality indicators
      relevant to our contamination risk model. Took structured notes
      during the meeting and wrote a synthesis document mapping her
      recommendations to our data schema (e.g., "turbidity alone is
      insufficient — combine with conductivity for contamination proxy").
    why: >
      Communicating with domain experts outside CS requires adapting
      vocabulary and framing questions in terms they can answer. Applying
      CS/data skills to the water quality domain required me to bridge
      the gap between our sensor measurements and the hydrology concepts
      (NTU thresholds, seasonal baselines) that give them meaning.
    reflection: >
      I realized during the meeting that I had framed two questions
      too technically (asking about "feature importance" when I should
      have asked "which measurements matter most for safety decisions").
      Prof. Dupont rephrased them for me, which was a useful lesson in
      audience adaptation. Next time, I will draft questions in
      plain language first and only add technical terms if necessary.
    evidence:
      - label: "Meeting synthesis"
        url: "https://github.com/oesteban/304-portfolio-template/blob/main/student.yaml"
      - label: "Question preparation"
        url: "https://github.com/oesteban/304-portfolio-template/blob/main/questions.yaml"

  - title: "Sensor auto-shutdown investigation and fix"
    date: "2026-03-10"
    sprint: "W3"
    skills:
      cs_engineer: 0.8
      data_engineer: 0.2
      professionalism: 0.0
    what: >
      Investigated why the AquaSense probe stops streaming after ~20
      minutes. Used Wireshark BLE captures to identify a connection
      parameter update (supervision timeout = 1200 ms) sent by the probe
      firmware at T+18 min. Confirmed the root cause by writing a test
      that forces a connection parameter renegotiation. Quantified the
      issue: 23 out of 25 test runs failed at 18±0.3 min (see timing
      plot). Filed a detailed bug report with the vendor including
      packet captures.
    why: >
      Evaluating system behavior under real operating conditions is
      essential before building downstream pipelines that assume
      continuous data. The 20-minute limit would have silently corrupted
      our overnight monitoring datasets. Systematic analysis (hypothesis
      → controlled test → quantified result) is the core of the
      "évaluer" competency.
    reflection: >
      This bug cost the team 3 days. In retrospect, I should have run
      a 24-hour soak test in W1 before building any pipeline code.
      Lesson: always test worst-case duration first, especially with
      hardware you don't control. I've now added a "soak test" column
      to our hardware acceptance checklist.
    evidence:
      - label: "Bug report"
        url: "https://github.com/hbldh/bleak/issues/1"
      - label: "Test script"
        url: "https://github.com/pytest-dev/pytest/blob/main/README.rst"
    # figures:
    #   - path: "figures/sensor-timeout-plot.png"
    #     caption: "BLE disconnection timing across 25 test runs (mean 18.1 min, σ=0.3 min)"

  - title: "Client demo — sprint review presentation"
    date: "2026-03-11"
    sprint: "W3"
    skills:
      cs_engineer: 0.0
      data_engineer: 0.0
      professionalism: 1.0
    what: >
      Prepared and delivered the W3 sprint review presentation to the
      client (municipal water authority). Structured the demo around
      their priorities: (1) data reliability (the auto-shutdown fix),
      (2) dashboard prototype, (3) next sprint plan. Included a live
      demo of the BLE acquisition running for 30 minutes to demonstrate
      the fix. Handled 4 client questions, including one about GDPR
      implications of storing GPS-tagged water samples.
    why: >
      Presenting to a non-technical client requires translating
      engineering work into business value. I chose to lead with the
      reliability fix because the client's main concern was "can we
      trust overnight data?" — framing the auto-shutdown bug as a
      solved risk rather than a technical detail. Arguing for our
      architecture choices (SQLite buffer) in terms the client could
      evaluate (no data loss even without connectivity) is part of
      the "argumenter" competency.
    reflection: >
      The GDPR question caught me off guard — I had not considered that
      our GPS-tagged samples could constitute personal data if deployed
      near private properties. I committed to follow up with a privacy
      impact assessment. This taught me that client presentations are
      not just about showing work, but about surfacing risks I hadn't
      considered.
    evidence:
      - label: "Presentation slides"
        url: "https://github.com/typst/typst/blob/main/README.md"
      - label: "Meeting minutes"
        url: "https://github.com/oesteban/304-portfolio-template/blob/main/portfolio.typ"

  - title: "Dataset preprocessing pipeline — filtering, resampling, format conversion"
    date: "2026-03-17"
    sprint: "W4"
    skills:
      cs_engineer: 0.2
      data_engineer: 0.8
      professionalism: 0.0
    what: >
      Built the preprocessing pipeline for the first two weeks of field
      data (1.2 GB raw, 847 MB after cleaning). Steps: (1) removed
      calibration samples (first 30s of each session), (2) applied
      a 5-point median filter to remove ADC spikes, (3) resampled from
      500 Hz to 10 Hz for the dashboard and kept 500 Hz for the ML
      model, (4) converted from vendor CSV to Parquet with proper
      column typing. Validated output against manual spot-checks
      (5 random sessions, <0.1% deviation after filtering).
    why: >
      Raw sensor data is unusable without systematic cleaning. The
      choice of filter type, resampling rate, and output format all
      affect downstream analysis quality. Documenting these choices
      (and their quantified impact on data size and signal fidelity)
      is essential for reproducibility and for the team members who
      will build models on this data.
    reflection: >
      I initially wrote the pipeline as a single script, then refactored
      it into three composable functions after realizing that the ML team
      needed the 500 Hz data without resampling. This reinforced a
      lesson from W2: design for composability before you know all the
      use cases. Writing the validation spot-checks took 20% of the
      effort but caught a timezone bug that would have misaligned all
      timestamps.
    evidence:
      - label: "Preprocessing PR"
        url: "https://github.com/pandas-dev/pandas/blob/main/README.md"
      - label: "Validation notebook"
        url: "https://github.com/apache/arrow/blob/main/README.md"
    # figures:
    #   - path: "figures/preprocessing-comparison.png"
    #     caption: "Raw vs. filtered signal for session 2026-03-14_09h (pH channel)"

  - title: "Cross-team data integration support"
    date: "2026-03-18"
    sprint: "W4"
    skills:
      cs_engineer: 0.1
      data_engineer: 0.6
      professionalism: 0.3
    what: >
      Helped Team B (predictive model) integrate the preprocessed
      Parquet files into their training pipeline. Identified and fixed
      a schema mismatch (their loader expected ISO timestamps, our
      export used Unix epochs). Reviewed their feature engineering
      notebook and suggested adding rolling-window statistics (mean,
      std over 5-min windows) which they adopted.
    why: >
      Working across team boundaries requires understanding both the
      data producer's and consumer's perspectives. The schema mismatch
      was a concrete example of why data contracts matter — I should
      have published a schema specification in W2 instead of assuming
      the Parquet column names were self-documenting.
    reflection: >
      This cross-team work forced me to balance depth (finishing my own
      preprocessing improvements) with breadth (unblocking another team).
      I chose breadth because their sprint deadline was closer. In
      retrospect, I should have allocated time for integration support
      in our sprint planning — treating cross-team dependencies as
      explicit tasks rather than ad-hoc interruptions.
    evidence:
      - label: "Schema fix PR"
        url: "https://github.com/scipy/scipy/blob/main/README.rst"
      - label: "Feature engineering review"
        url: "https://github.com/scikit-learn/scikit-learn/blob/main/README.rst"
